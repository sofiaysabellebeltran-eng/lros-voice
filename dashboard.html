<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LROS Founder Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #0f0f2a);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: white; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card {
            background: rgba(15, 15, 30, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #2a2a3a;
        }
        .card h2 { color: #0078ff; margin-bottom: 15px; font-size: 1.2rem; }
        .metric { font-size: 2rem; color: white; margin: 10px 0; }
        .status-badge { 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-active { background: #00aa77; color: white; }
        .status-emergency { background: #ff4444; color: white; }
        .status-lockdown { background: #ffaa44; color: black; }
        .status-destruct { background: #8b0000; color: white; }
        button {
            background: #0078ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
        }
        button.danger { background: #ff4444; }
        button.warning { background: #ffaa44; color: black; }
        button.success { background: #00aa77; }
        .refresh-btn { background: #0078ff; margin-bottom: 20px; }
        table { width: 100%; color: #ccc; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #2a2a3a; }
        .status { text-align: center; color: #888; margin-top: 20px; }
        .governance-section { border-top: 1px solid #2a2a3a; margin-top: 20px; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎛️ LROS Founder Dashboard</h1>
        <button class="refresh-btn" onclick="refreshAll()">🔄 Refresh Data</button>
        
        <div class="grid">
            <div class="card">
                <h2>⚖️ System Governance</h2>
                <div id="governanceState">Loading...</div>
                <div style="margin-top: 15px;">
                    <button class="danger" onclick="emergencyStop()">🛑 Emergency Stop</button>
                    <button class="success" onclick="releaseStop()">✅ Release Stop</button>
                    <button class="warning" onclick="toggleOverride()">👑 Toggle Founder Override</button>
                </div>
            </div>
            <div class="card">
                <h2>📊 Bandit Stats</h2>
                <div id="banditStats">Loading...</div>
            </div>
            <div class="card">
                <h2>🌐 Swarm & Community</h2>
                <div id="swarmStats">Loading...</div>
                <div id="communityStats">Loading...</div>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>📈 A/B Tests</h2>
                <div id="abTests">Loading...</div>
            </div>
            <div class="card">
                <h2>🔍 Fine-Tuning Data</h2>
                <div id="finetuneStats">Loading...</div>
            </div>
            <div class="card">
                <h2>⚠️ Constitutional Breaches</h2>
                <div id="breaches">Loading...</div>
            </div>
        </div>
        
        <div class="card">
            <h2>📋 Recent Governance Actions</h2>
            <div id="governanceHistory">Loading...</div>
        </div>
        
        <div class="status" id="status">⚡ Ready</div>
    </div>

    <script>
        const BACKEND_URL = 'https://lros-full-backend.onrender.com';
        const ADMIN_KEY = 'lros-admin-2026';
        
        async function fetchWithAuth(url) {
            const response = await fetch(url, {
                headers: { 'x-api-key': ADMIN_KEY }
            });
            return response.json();
        }
        
        async function refreshAll() {
            document.getElementById('status').textContent = '🔄 Refreshing...';
            
            // Governance State
            try {
                const gov = await fetch(`${BACKEND_URL}/api/governance/state`).then(r => r.json());
                let stateClass = 'status-active';
                if (gov.state === 'emergency_stop') stateClass = 'status-emergency';
                else if (gov.state === 'self_destruct') stateClass = 'status-destruct';
                else if (gov.state === 'lockdown') stateClass = 'status-lockdown';
                
                const govHtml = `
                    <div><span class="status-badge ${stateClass}">${gov.state.toUpperCase()}</span></div>
                    <div class="metric">⚠️ Breaches: ${gov.constitutional_breaches}</div>
                    <div>🚨 Emergency Stop: ${gov.emergency_stop ? 'ACTIVE' : 'OFF'}</div>
                    <div>👑 Override: ${gov.override_active ? 'ACTIVE' : 'OFF'}</div>
                    <div>💀 Self-Destruct: ${gov.self_destruct ? 'TRIGGERED' : 'SAFE'}</div>
                `;
                document.getElementById('governanceState').innerHTML = govHtml;
            } catch(e) { document.getElementById('governanceState').innerHTML = 'Error loading'; }
            
            // Bandit Stats
            try {
                const bandit = await fetch(`${BACKEND_URL}/api/bandit/stats`).then(r => r.json());
                const banditHtml = `
                     <table>
                         <tr><th>Pattern</th><th>Pulls</th><th>Avg Reward</th></tr>
                        ${Object.entries(bandit.patterns).map(([name, stats]) => `
                            <tr><td>${name}</td><td>${stats.pulls}</td><td>${stats.avg_reward.toFixed(3)}</td></tr>
                        `).join('')}
                    </table>
                    <div class="metric">Total: ${bandit.total_pulls}</div>
                `;
                document.getElementById('banditStats').innerHTML = banditHtml;
            } catch(e) { document.getElementById('banditStats').innerHTML = 'Error'; }
            
            // Swarm Stats
            try {
                const swarm = await fetch('https://lros-swarm-hub.onrender.com/api/swarm/stats').then(r => r.json());
                document.getElementById('swarmStats').innerHTML = `
                    <div class="metric">${swarm.instances || 0} Instances</div>
                    <div>Best Pattern: ${swarm.best_pattern || 'N/A'}</div>
                `;
            } catch(e) { document.getElementById('swarmStats').innerHTML = 'Swarm hub connecting...'; }
            
            // Community Stats
            try {
                const community = await fetch('https://lros-swarm-hub.onrender.com/api/community/stats').then(r => r.json());
                document.getElementById('communityStats').innerHTML = `
                    <div>🌍 Community Patterns: ${community.total_patterns || 0}</div>
                    <div>👍 Total Votes: ${community.total_votes || 0}</div>
                `;
            } catch(e) { document.getElementById('communityStats').innerHTML = 'Community hub connecting...'; }
            
            // A/B Tests
            try {
                const tests = await fetch(`${BACKEND_URL}/api/ab/tests`).then(r => r.json());
                if (tests.tests && tests.tests.length > 0) {
                    const test = tests.tests[0];
                    document.getElementById('abTests').innerHTML = `
                        <div>${test.variant_a} vs ${test.variant_b}</div>
                        <div>Exposures: ${test.exposures_a + test.exposures_b}</div>
                        <div>Winner: ${test.winner === 'tie' ? 'Tie' : test.winner.toUpperCase()}</div>
                    `;
                } else {
                    document.getElementById('abTests').innerHTML = 'No active A/B tests';
                }
            } catch(e) { document.getElementById('abTests').innerHTML = 'Error'; }
            
            // Fine-Tuning
            try {
                const ft = await fetchWithAuth(`${BACKEND_URL}/api/finetune/stats`);
                document.getElementById('finetuneStats').innerHTML = `
                    <div class="metric">${ft.total || 0} Training Pairs</div>
                    ${Object.entries(ft.by_pattern || {}).map(([p, c]) => `<div>${p}: ${c} samples</div>`).join('')}
                `;
            } catch(e) { document.getElementById('finetuneStats').innerHTML = 'No data yet'; }
            
            // Constitutional Breaches
            try {
                const breaches = await fetchWithAuth(`${BACKEND_URL}/api/governance/breaches`);
                const breachesHtml = `
                    <div class="metric">${breaches.breaches?.length || 0} Total Breaches</div>
                    ${breaches.breaches?.slice(-5).map(b => `
                        <div style="font-size: 11px; color: #ff8888;">${b.timestamp?.substring(0, 16)}: ${b.attempt?.substring(0, 50)}</div>
                    `).join('') || '<div>No breaches recorded</div>'}
                `;
                document.getElementById('breaches').innerHTML = breachesHtml;
            } catch(e) { document.getElementById('breaches').innerHTML = 'No breaches'; }
            
            // Governance History
            try {
                const history = await fetchWithAuth(`${BACKEND_URL}/api/governance/history?limit=10`);
                const historyHtml = `
                    <table>
                        <tr><th>Time</th><th>Action</th><th>User</th></tr>
                        ${history.history?.slice(-8).map(h => `
                            <tr>
                                <td>${h.timestamp?.substring(0, 16)}</td>
                                <td>${h.action}</td>
                                <td>${h.user_id || 'system'}</td>
                            </tr>
                        `).join('') || '<tr><td colspan="3">No history</td></tr>'}
                    </table>
                `;
                document.getElementById('governanceHistory').innerHTML = historyHtml;
            } catch(e) { document.getElementById('governanceHistory').innerHTML = 'No history'; }
            
            document.getElementById('status').textContent = '✅ Updated';
            setTimeout(() => document.getElementById('status').textContent = '⚡ Ready', 2000);
        }
        
        async function emergencyStop() {
            const reason = prompt('Reason for emergency stop:');
            if (!reason) return;
            await fetch(`${BACKEND_URL}/api/governance/emergency-stop?reason=${encodeURIComponent(reason)}`, {
                method: 'POST',
                headers: { 'x-api-key': ADMIN_KEY, 'user-id': 'founder' }
            });
            refreshAll();
        }
        
        async function releaseStop() {
            await fetch(`${BACKEND_URL}/api/governance/release-stop`, {
                method: 'POST',
                headers: { 'x-api-key': ADMIN_KEY, 'user-id': 'founder' }
            });
            refreshAll();
        }
        
        async function toggleOverride() {
            const state = await fetch(`${BACKEND_URL}/api/governance/state`).then(r => r.json());
            const newState = !state.override_active;
            await fetch(`${BACKEND_URL}/api/governance/override?enabled=${newState}`, {
                method: 'POST',
                headers: { 'x-api-key': ADMIN_KEY, 'user-id': 'founder' }
            });
            refreshAll();
        }
        
        refreshAll();
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
