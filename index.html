<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LROS Voice AI – Community Swarm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #0f0f2a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(15, 15, 30, 0.9);
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #2a2a3a;
        }
        h1 { color: white; text-align: center; font-size: 2rem; margin-bottom: 5px; }
        .subtitle { color: #888; text-align: center; margin-bottom: 20px; font-size: 0.85rem; }
        .pattern-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .pattern-btn {
            background: #2a2a3a; color: white; border: none; padding: 8px 16px;
            border-radius: 20px; cursor: pointer; font-size: 12px; transition: all 0.2s;
        }
        .pattern-btn:hover { background: #3a3a4a; }
        .pattern-btn.active { background: #0078ff; }
        .community-btn {
            background: #3a3a4a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            margin-bottom: 15px;
        }
        .community-btn:hover { background: #4a4a5a; }
        .community-panel {
            background: #0a0a14;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #2a2a3a;
        }
        .chat-box {
            background: #0a0a14;
            border-radius: 15px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #2a2a3a;
        }
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 18px; max-width: 85%; word-wrap: break-word; }
        .user-message { background: #0078ff; color: white; margin-left: auto; text-align: right; }
        .ai-message { background: #2d2d3a; color: #e0e0e0; margin-right: auto; }
        .feedback-buttons { margin-top: 8px; display: flex; gap: 8px; }
        .feedback-btn { background: #3a3a4a; border: none; padding: 4px 12px; border-radius: 15px; cursor: pointer; font-size: 11px; color: white; }
        .feedback-btn:hover { background: #4a4a5a; }
        .input-area { display: flex; gap: 10px; margin-bottom: 10px; }
        input {
            flex: 1; padding: 12px 18px; border: none; border-radius: 25px;
            background: #1a1a2a; color: white; font-size: 15px; border: 1px solid #3a3a4a;
        }
        button { padding: 12px 20px; border: none; border-radius: 25px; background: #0078ff; color: white; cursor: pointer; font-size: 15px; }
        .voice-btn { background: #00aa77; }
        .status { text-align: center; color: #888; font-size: 11px; margin-top: 10px; padding: 8px; }
        .badge { text-align: center; font-size: 10px; color: #00aa77; margin-top: 8px; }
        .persona-badge { text-align: center; font-size: 10px; color: #ffaa44; margin-top: 5px; }
        .community-pattern-item {
            margin-bottom: 10px;
            padding: 10px;
            background: #1a1a2a;
            border-radius: 10px;
        }
        .community-pattern-name { color: #00aa77; font-weight: bold; font-size: 13px; }
        .community-pattern-prompt { color: #888; font-size: 11px; margin: 5px 0; }
        .community-pattern-stats { color: #ffaa44; font-size: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 LROS Voice AI</h1>
        <div class="subtitle">Community Swarm · Auto-Optimizing</div>
        
        <div class="pattern-selector">
            <button class="pattern-btn" data-pattern="single">⚡ Single</button>
            <button class="pattern-btn" data-pattern="chain">🔗 Chain</button>
            <button class="pattern-btn" data-pattern="parallel">🔄 Parallel</button>
            <button class="pattern-btn active" data-pattern="auto">🤖 Auto (Smart)</button>
        </div>
        
        <div style="text-align: center; margin-bottom: 15px;">
            <button id="communityBtn" class="community-btn">🌍 Community Hub</button>
        </div>
        
        <div id="communityPanel" class="community-panel" style="display: none;">
            <h3 style="color: #0078ff; margin-bottom: 10px; font-size: 14px;">🌍 Top Community Patterns</h3>
            <div id="communityPatterns">Loading community patterns...</div>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">🔷 Hello. I am LROS. Rate my responses with 👍 👎 to help the community learn together.</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
            <button class="voice-btn" onclick="startVoice()">🎤 Speak</button>
        </div>
        
        <div class="badge" id="swarmBadge">🌐 Swarm: learning...</div>
        <div class="persona-badge" id="personaBadge">👤 Loading profile...</div>
        <div class="status" id="status">⚡ Ready</div>
    </div>

    <script>
        const API_URL = 'https://lros-full-backend.onrender.com/api/chat';
        const FEEDBACK_URL = 'https://lros-full-backend.onrender.com/api/feedback';
        
        let userId = localStorage.getItem('lros_user_id');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('lros_user_id', userId);
        }
        
        function addMessage(text, isUser, rowIndex = null, patternUsed = null) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            const textSpan = document.createElement('span');
            textSpan.textContent = text;
            messageDiv.appendChild(textSpan);
            
            if (!isUser && rowIndex && patternUsed) {
                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback-buttons';
                const thumbsUp = document.createElement('button');
                thumbsUp.textContent = '👍 Good';
                thumbsUp.className = 'feedback-btn';
                thumbsUp.onclick = () => submitFeedback(rowIndex, patternUsed, 1, text);
                const thumbsDown = document.createElement('button');
                thumbsDown.textContent = '👎 Bad';
                thumbsDown.className = 'feedback-btn';
                thumbsDown.onclick = () => submitFeedback(rowIndex, patternUsed, -1, text);
                feedbackDiv.appendChild(thumbsUp);
                feedbackDiv.appendChild(thumbsDown);
                messageDiv.appendChild(feedbackDiv);
            }
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        async function submitFeedback(rowIndex, patternUsed, rating, originalMessage) {
            document.getElementById('status').textContent = 'Saving feedback...';
            try {
                const response = await fetch(FEEDBACK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        row_index: rowIndex, 
                        pattern_used: patternUsed, 
                        rating: rating, 
                        feedback_text: '',
                        user_id: userId,
                        original_message: originalMessage
                    })
                });
                const data = await response.json();
                if (data.status === 'ok') {
                    document.getElementById('status').textContent = '✅ Feedback saved!';
                    fetch('https://lros-full-backend.onrender.com/api/report-to-hub', { method: 'POST' });
                    loadPersona();
                    setTimeout(() => document.getElementById('status').textContent = '⚡ Ready', 2000);
                }
            } catch(error) {
                document.getElementById('status').textContent = '❌ Feedback error';
            }
        }
        
        async function loadPersona() {
            try {
                const response = await fetch(`https://lros-full-backend.onrender.com/api/persona/${userId}`);
                const persona = await response.json();
                const badge = document.getElementById('personaBadge');
                if (persona.type === 'power_user') badge.innerHTML = '👑 Power User · ' + persona.interactions + ' interactions';
                else if (persona.type === 'regular') badge.innerHTML = '⭐ Regular User · ' + persona.interactions + ' interactions';
                else badge.innerHTML = '🔍 Explorer · Rate responses to teach me (' + persona.interactions + ')';
            } catch(e) { console.log('Persona not ready'); }
        }
        
        async function updateSwarmStats() {
            try {
                const response = await fetch('https://lros-swarm-hub.onrender.com/api/swarm/stats');
                const data = await response.json();
                const badge = document.getElementById('swarmBadge');
                if (data.instances === 1) badge.innerHTML = `🌐 Swarm: ${data.instances} instance | Best: ${data.best_pattern}`;
                else badge.innerHTML = `🌐 Swarm: ${data.instances} instances learning | Best: ${data.best_pattern}`;
            } catch(e) { document.getElementById('swarmBadge').innerHTML = '🌐 Swarm learning...'; }
        }
        
        async function loadCommunityPatterns() {
            try {
                const response = await fetch('https://lros-full-backend.onrender.com/api/community/top');
                const data = await response.json();
                const container = document.getElementById('communityPatterns');
                if (data.patterns && data.patterns.length > 0) {
                    container.innerHTML = data.patterns.map(p => `
                        <div class="community-pattern-item">
                            <div class="community-pattern-name">${p.name}</div>
                            <div class="community-pattern-prompt">${p.prompt ? p.prompt.substring(0, 100) + '...' : 'No description'}</div>
                            <div class="community-pattern-stats">⭐ ${p.votes || 0} votes | 📊 Score: ${p.score || 0}</div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div style="color: #888;">No community patterns yet. Rate responses to share!</div>';
                }
            } catch(e) {
                document.getElementById('communityPatterns').innerHTML = '<div style="color: #888;">Community hub connecting...</div>';
            }
        }
        
        function speakResponse(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text.replace(/[*_#]/g, ''));
            utterance.lang = 'en-US';
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            let pattern = 'auto';
            const active = document.querySelector('.pattern-btn.active');
            if (active && active.dataset.pattern) pattern = active.dataset.pattern;
            addMessage(message, true);
            input.value = '';
            document.getElementById('status').textContent = 'Thinking...';
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, pattern: pattern, model: 'deepseek', truth_box: true, user_id: userId })
                });
                const data = await response.json();
                addMessage(data.response, false, data.row_index, data.pattern_used);
                speakResponse(data.response);
                document.getElementById('status').textContent = '⚡ Ready';
            } catch(error) {
                addMessage('Error: ' + error.message, false);
                document.getElementById('status').textContent = '❌ Error';
            }
        }
        
        function startVoice() {
            if (!('webkitSpeechRecognition' in window)) { alert('Voice not supported. Try Chrome.'); return; }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            document.getElementById('status').textContent = '🎤 Listening...';
            recognition.onresult = function(event) {
                document.getElementById('messageInput').value = event.results[0][0].transcript;
                document.getElementById('status').textContent = 'Processing...';
                sendMessage();
            };
            recognition.start();
        }
        
        // Community Hub toggle
        let communityVisible = false;
        document.getElementById('communityBtn').onclick = async () => {
            communityVisible = !communityVisible;
            document.getElementById('communityPanel').style.display = communityVisible ? 'block' : 'none';
            if (communityVisible) {
                await loadCommunityPatterns();
            }
        };
        
        // Pattern selector
        document.querySelectorAll('.pattern-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('status').textContent = `Pattern: ${btn.dataset.pattern}`;
                setTimeout(() => document.getElementById('status').textContent = '⚡ Ready', 1500);
            });
        });
        
        loadPersona();
        updateSwarmStats();
        setInterval(updateSwarmStats, 30000);
        setInterval(loadPersona, 60000);
    </script>
</body>
</html>
