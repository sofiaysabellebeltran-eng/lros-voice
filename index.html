<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LROS Voice AI – Constitutional Swarm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #0f0f2a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(15, 15, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 120, 255, 0.3);
        }
        
        h1 {
            color: white;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        
        .chat-box {
            background: #0a0a14;
            border-radius: 20px;
            padding: 20px;
            height: 450px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #2a2a3a;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: linear-gradient(135deg, #0078ff, #0055cc);
            color: white;
            margin-left: auto;
            text-align: right;
            border-bottom-right-radius: 5px;
        }
        
        .ai-message {
            background: linear-gradient(135deg, #2a2a3a, #1e1e2a);
            color: #e0e0e0;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }
        
        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 40px;
            background: #1a1a2a;
            color: white;
            font-size: 16px;
            border: 1px solid #3a3a4a;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #0078ff;
            box-shadow: 0 0 10px rgba(0, 120, 255, 0.3);
        }
        
        button {
            padding: 14px 24px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #0078ff, #0055cc);
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0, 120, 255, 0.4);
        }
        
        .voice-btn {
            background: linear-gradient(135deg, #00cc88, #009966);
        }
        
        .voice-btn:hover {
            box-shadow: 0 5px 15px rgba(0, 204, 136, 0.4);
        }
        
        .status {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-top: 10px;
            padding: 8px;
            border-radius: 20px;
            background: #0a0a14;
        }
        
        .status.listening {
            color: #00cc88;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .pattern-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }
        
        .pattern-btn {
            background: #2a2a3a;
            padding: 8px 16px;
            font-size: 12px;
        }
        
        .pattern-btn.active {
            background: linear-gradient(135deg, #0078ff, #0055cc);
        }
        
        .truth-box-badge {
            text-align: center;
            margin-top: 10px;
            font-size: 11px;
            color: #00cc88;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a2a;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #0078ff;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 LROS Voice AI</h1>
        <div class="subtitle">Constitutional Swarm · Speak or Type · AI Responds</div>
        
        <div class="pattern-selector">
            <button class="pattern-btn active" data-pattern="single">⚡ Single</button>
            <button class="pattern-btn" data-pattern="chain">🔗 Chain</button>
            <button class="pattern-btn" data-pattern="parallel">🔄 Parallel</button>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">🔷 Hello, Founder. I am LROS — the Layered Research Operating System. I am constitutionally bound to assist with your operational needs. Ask me anything, or click the microphone to speak.</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
            <button class="voice-btn" onclick="startVoice()">🎤 Speak</button>
        </div>
        
        <div class="truth-box-badge" id="truthBoxBadge">🔒 Constitutional Governance Active</div>
        <div class="status" id="status">⚡ Ready</div>
    </div>

    <script>
        // ============================================================
        // LROS CONSTITUTIONAL VOICE AI – FULL INTEGRATION
        // Backend: FastAPI with Constitutional Layers
        // Features: Voice Input, Voice Output, Pattern Selection
        // ============================================================
        
        // Configuration
        const API_URL = 'https://lros-backend-slgg.onrender.com/api/chat';
        let currentPattern = 'single';
        let currentTruthBox = true;
        
        // DOM Elements
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const statusDiv = document.getElementById('status');
        const truthBoxBadge = document.getElementById('truthBoxBadge');
        
        // ============================================================
        // 1. UI HELPERS
        // ============================================================
        
        function setStatus(text, isListening = false) {
            statusDiv.textContent = text;
            if (isListening) {
                statusDiv.classList.add('listening');
            } else {
                statusDiv.classList.remove('listening');
            }
        }
        
        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            messageDiv.textContent = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function clearInput() {
            messageInput.value = '';
        }
        
        // ============================================================
        // 2. VOICE OUTPUT (Text-to-Speech)
        // ============================================================
        
        function speakResponse(text) {
            // Stop any ongoing speech
            window.speechSynthesis.cancel();
            
            // Clean text (remove markdown, emojis, special characters for cleaner speech)
            let cleanText = text
                .replace(/[*_#`]/g, '')
                .replace(/🔍.*$/m, '')
                .replace(/[^\w\s.,!?()-]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            
            // Create utterance
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'en-US';
            utterance.rate = 0.95;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            
            // Optional: Try to get a better voice
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google'));
            if (preferredVoice) utterance.voice = preferredVoice;
            
            // Speak
            window.speechSynthesis.speak(utterance);
            
            // Update status when speaking starts
            utterance.onstart = () => setStatus('🔊 Speaking...');
            utterance.onend = () => setStatus('⚡ Ready');
            utterance.onerror = () => setStatus('⚡ Ready');
        }
        
        // ============================================================
        // 3. VOICE INPUT (Speech-to-Text)
        // ============================================================
        
        function startVoice() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Voice recognition is not supported in this browser. Please use Chrome, Edge, or Safari.');
                return;
            }
            
            const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            
            setStatus('🎤 Listening...', true);
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                messageInput.value = transcript;
                setStatus('📝 Processing...');
                sendMessage();
            };
            
            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);
                setStatus('❌ Try again');
                setTimeout(() => setStatus('⚡ Ready'), 2000);
            };
            
            recognition.onend = function() {
                if (statusDiv.textContent === '🎤 Listening...') {
                    setStatus('⚡ Ready');
                }
            };
            
            recognition.start();
        }
        
        // ============================================================
        // 4. PATTERN SELECTION
        // ============================================================
        
        function setPattern(pattern) {
            currentPattern = pattern;
            document.querySelectorAll('.pattern-btn').forEach(btn => {
                if (btn.dataset.pattern === pattern) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            setStatus(`⚡ Pattern: ${pattern.toUpperCase()}`);
        }
        
        // ============================================================
        // 5. SEND MESSAGE TO BACKEND
        // ============================================================
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message to chat
            addMessage(message, true);
            clearInput();
            setStatus('🧠 Thinking...');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        pattern: currentPattern,
                        truth_box: currentTruthBox
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const aiResponse = data.response || 'No response from LROS.';
                
                // Add AI response to chat
                addMessage(aiResponse, false);
                
                // Speak the response
                speakResponse(aiResponse);
                
                setStatus('⚡ Ready');
                
                // Update Truth Box badge if response contains constitutional marker
                if (data.constitutional || aiResponse.includes('🔍')) {
                    truthBoxBadge.innerHTML = '🔒 Constitutional Layer Applied';
                    truthBoxBadge.style.color = '#00cc88';
                } else {
                    truthBoxBadge.innerHTML = '🔓 Standard Response';
                    truthBoxBadge.style.color = '#ffaa44';
                }
                
            } catch (error) {
                console.error('Error:', error);
                addMessage(`⚠️ Error: ${error.message}. Please check your connection.`, false);
                setStatus('❌ Connection Error');
                setTimeout(() => setStatus('⚡ Ready'), 3000);
            }
        }
        
        // ============================================================
        // 6. INITIALIZATION
        // ============================================================
        
        function initializeVoices() {
            // Preload voices (optional)
            window.speechSynthesis.getVoices();
        }
        
        // Event Listeners
        document.querySelectorAll('.pattern-btn').forEach(btn => {
            btn.addEventListener('click', () => setPattern(btn.dataset.pattern));
        });
        
        // Enter key support
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Initialize
        initializeVoices();
        setStatus('⚡ LROS Constitutional Swarm Ready');
        
        // Optional: welcome message with voice
        setTimeout(() => {
            const welcomeMsg = "LROS Constitutional Swarm is online. You may speak or type your questions.";
            // Uncomment to have LROS speak on load
            // speakResponse(welcomeMsg);
        }, 1000);
    </script>
</body>
</html>
