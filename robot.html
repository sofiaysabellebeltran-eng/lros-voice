<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LROS Robot Control Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #0f0f2a);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: white; margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card {
            background: rgba(15, 15, 30, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #2a2a3a;
        }
        .card h2 { color: #0078ff; margin-bottom: 15px; font-size: 1.2rem; }
        .robot-status {
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            background: #2a2a3a;
            color: #aaa;
        }
        button {
            background: #0078ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
        }
        button.danger { background: #ff4444; }
        button.success { background: #00aa77; }
        .command-panel { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .safety-rule { 
            font-size: 12px; 
            color: #ffaa44; 
            margin: 5px 0;
            padding: 5px;
            background: #1a1a2a;
            border-radius: 5px;
        }
        .status { text-align: center; color: #888; margin-top: 20px; }
        .result-box {
            margin-top: 15px;
            padding: 10px;
            background: #1a1a2a;
            border-radius: 10px;
            color: #aaa;
            font-family: monospace;
            font-size: 12px;
        }
        input {
            background: #1a1a2a;
            border: 1px solid #2a2a3a;
            color: white;
            padding: 8px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 LROS Robot Control Center</h1>
        
        <div class="grid">
            <div class="card">
                <h2>🤖 Fleet Status</h2>
                <div id="fleetStats">Loading...</div>
                <div class="command-panel">
                    <button onclick="registerRobot()">➕ Register Robot</button>
                    <button onclick="refreshFleet()">🔄 Refresh</button>
                </div>
            </div>
            <div class="card">
                <h2>⚖️ Constitutional Safety Rules</h2>
                <div id="safetyRules">Loading...</div>
            </div>
        </div>
        
        <div class="card">
            <h2>🎮 Robot Control (Simulation)</h2>
            <input type="text" id="robotIdInput" placeholder="Robot ID (e.g., robot_1)" value="robot_1">
            <div class="command-panel">
                <button onclick="sendCommand('move_forward', {distance: 1})">⬆️ Forward 1m</button>
                <button onclick="sendCommand('move_backward', {distance: 1})">⬇️ Backward 1m</button>
                <button onclick="sendCommand('turn_left', {angle: 45})">↩️ Turn Left 45°</button>
                <button onclick="sendCommand('turn_right', {angle: 45})">↪️ Turn Right 45°</button>
                <button onclick="sendCommand('stop')">⏹️ Stop</button>
                <button onclick="sendCommand('speak', {text: 'Hello'})">🔊 Speak</button>
                <button class="danger" onclick="sendCommand('emergency_stop')">🛑 EMERGENCY STOP</button>
            </div>
            <div id="commandResult" class="result-box">Ready for commands...</div>
        </div>
        
        <div class="card">
            <h2>📋 Safety Log</h2>
            <div id="safetyLog">Loading...</div>
        </div>
        
        <div class="status" id="status">⚡ Ready</div>
    </div>

    <script>
        const BACKEND_URL = 'https://lros-full-backend.onrender.com';
        const ADMIN_KEY = 'lros-admin-2026';
        
        async function refreshFleet() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/robot/fleet`);
                const data = await response.json();
                document.getElementById('fleetStats').innerHTML = `
                    <div class="robot-status">🤖 Total Robots: ${data.total_robots || 0}</div>
                    <div class="robot-status">⚡ Active: ${data.active_robots || 0}</div>
                `;
            } catch(e) {
                document.getElementById('fleetStats').innerHTML = '<div class="robot-status">No robots registered yet</div>';
            }
        }
        
        async function loadSafetyRules() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/robot/safety`);
                const data = await response.json();
                const rulesHtml = data.constitutional_rules?.map(rule => 
                    `<div class="safety-rule">⚖️ ${rule}</div>`
                ).join('') || '<div>Loading...</div>';
                document.getElementById('safetyRules').innerHTML = rulesHtml;
                
                const violationsHtml = data.recent_violations?.slice(-5).map(v => 
                    `<div style="font-size: 11px; color: #ff8888; margin: 5px 0;">⚠️ ${v.violations?.join(', ')} - ${new Date(v.timestamp).toLocaleTimeString()}</div>`
                ).join('') || '<div>No violations</div>';
                document.getElementById('safetyLog').innerHTML = violationsHtml;
            } catch(e) {
                document.getElementById('safetyRules').innerHTML = '<div>Safety system active</div>';
                document.getElementById('safetyLog').innerHTML = '<div>No violations recorded</div>';
            }
        }
        
        async function registerRobot() {
            const robotId = document.getElementById('robotIdInput').value;
            const robotType = prompt('Robot type (simulation/lisa/temi/kettybot):', 'simulation');
            if (!robotId || !robotType) return;
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/robot/register?robot_id=${robotId}&robot_type=${robotType}`, {
                    method: 'POST',
                    headers: { 'x-api-key': ADMIN_KEY }
                });
                const data = await response.json();
                document.getElementById('commandResult').innerHTML = `✅ Registered ${robotId} as ${robotType}`;
                refreshFleet();
            } catch(e) {
                document.getElementById('commandResult').innerHTML = `❌ Registration failed: ${e.message}`;
            }
        }
        
        async function sendCommand(command, params = {}) {
            const robotId = document.getElementById('robotIdInput').value;
            if (!robotId) {
                document.getElementById('commandResult').innerHTML = '❌ Please enter a robot ID';
                return;
            }
            
            document.getElementById('status').textContent = '🚀 Sending command...';
            document.getElementById('commandResult').innerHTML = 'Sending...';
            
            try {
                const url = new URL(`${BACKEND_URL}/api/robot/command`);
                url.searchParams.append('robot_id', robotId);
                url.searchParams.append('command', command);
                if (Object.keys(params).length > 0) {
                    url.searchParams.append('params', JSON.stringify(params));
                }
                
                const response = await fetch(url, { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'blocked') {
                    document.getElementById('commandResult').innerHTML = `⚠️ BLOCKED: ${data.violations?.join(', ')}`;
                } else if (data.status === 'emergency_stop') {
                    document.getElementById('commandResult').innerHTML = `🛑 EMERGENCY STOP! Violations: ${data.violations?.join(', ')}`;
                } else {
                    document.getElementById('commandResult').innerHTML = `✅ Command executed: ${command}\n${JSON.stringify(data, null, 2)}`;
                }
                document.getElementById('status').textContent = '⚡ Ready';
                loadSafetyRules();
            } catch(e) {
                document.getElementById('commandResult').innerHTML = `❌ Error: ${e.message}`;
                document.getElementById('status').textContent = '⚡ Ready';
            }
        }
        
        refreshFleet();
        loadSafetyRules();
        setInterval(refreshFleet, 30000);
        setInterval(loadSafetyRules, 30000);
    </script>
</body>
</html>
